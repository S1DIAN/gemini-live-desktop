name: Release Windows Installer

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installers
        run: npm run dist:win

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $assets = Get-ChildItem artifacts -File | Where-Object {
            (
              $_.Extension -eq ".exe" -or
              $_.Extension -eq ".blockmap" -or
              $_.Name -eq "latest.yml"
            ) -and
            ($_.Name -notlike "builder-*")
          } | Select-Object -ExpandProperty FullName
          if (-not $assets -or $assets.Count -eq 0) {
            throw "No release assets found in artifacts directory."
          }

          gh release view "$env:RELEASE_TAG" 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:RELEASE_TAG" $assets --clobber
          } else {
            gh release create "$env:RELEASE_TAG" $assets --generate-notes
          }
